<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchpad</title>
    <link rel="stylesheet" href="sketchpad.css">
</head>
<body>
    <form>
        <label for="inp">Enter appropriate color : </label>
        <input type="text" name="inp" id="inp">
        <button>change color</button>
    </form>
    <div id="container"></div>
    <div id="buttons" style="display: flex; width: 200px; margin-top: 20px; justify-content: space-between;">
        <div><button id="disableGrid" style="flex: 1 1 auto;">Disable/Enable Grid</button></div>
        <div><button id="clear" style="flex: 1 1 auto">Clear</button></div>
    </div>
    <script src="sketchpad.js"></script>
</body>
</html>
